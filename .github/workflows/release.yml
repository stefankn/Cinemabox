name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish macOS (arm64)
        run: dotnet publish Cinemabox/Cinemabox.csproj -r osx-arm64 --self-contained -c Release

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Cinemabox/bin/Release/net10.0/osx-arm64/publish/*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Publish Windows (x64)
        run: dotnet publish Cinemabox/Cinemabox.csproj -r win-x64 --self-contained -c Release

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: Cinemabox/bin/Release/net10.0/win-x64/publish/*.exe
